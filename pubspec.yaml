name: chrome_travis
homepage: https://github.com/tekartik/chrome_travis.dart
description: travis-ci scripts for chrome
version: 0.3.0
publish_to: none

environment:
  sdk: ^3.12.0

dependencies:
  path: ">=1.9.1"
  process_run: ">=1.2.1+1"
  args: ">=2.7.0"

dev_dependencies:
  dev_build: ">=1.1.7+3"
  test: ">=1.31.0"
  dev_test: ">=1.0.0+4"
  build_test: any
  build_runner: ">=2.15.0"
  pedantic:
  tekartik_lints:
    git:
      url: https://github.com/tekartik/common.dart
      path: packages/lints
    version: '>=0.1.0'
